  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0D0519; font-family: 'Syne', sans-serif; color: #F5E642; }

    #c {
      position: fixed; inset: 0; display: block;

    }
    #c.ready { opacity: 1; }

    /* normal cursor everywhere */
    body { cursor: default; }

    /* ── HUD ── */
    #hud {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem; pointer-events: none;
    }
    .hud-logo {
      font-size: .72rem; font-weight: 800; letter-spacing: .22em;
      text-transform: uppercase; display: flex; align-items: center; gap: .5rem;
    }
    .hud-dot {
      width: 7px; height: 7px; background: #F5E642; border-radius: 50%;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.15;transform:scale(.4)} }
    .hud-hint {
      font-size: .6rem; font-weight: 600; letter-spacing: .18em;
      text-transform: uppercase; opacity: .38;
    }

    /* ── TOOLTIP ── */
    #tip {
      position: fixed; z-index: 200; pointer-events: none;
      padding: .45rem .95rem;
      background: #F5E642; color: #1A0A2E;
      font-size: .64rem; font-weight: 800;
      letter-spacing: .14em; text-transform: uppercase;
      transform: translate(-50%, -160%);
      white-space: nowrap; opacity: 0; transition: opacity .12s;
    }
    #tip.on { opacity: 1; }
    #tip::after {
      content: ''; position: absolute; bottom: -6px; left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-bottom: none; border-top-color: #F5E642;
    }

    /* ── OVERLAY ── */
    #ov { position: fixed; inset: 0; z-index: 260; display: none; }
    #ov.on { display: block; }

    /* ── PANEL ── */
    #panel {
      position: fixed; top: 0; right: 0;
      width: min(500px,100vw); height: 100vh;
      z-index: 300; background: #0D0519;
      border-left: 2px solid #F5E642;
      transform: translateX(100%);
      transition: transform .45s cubic-bezier(.16,1,.3,1);
      display: flex; flex-direction: column; overflow: hidden;
    }
    #panel.open { transform: translateX(0); }
    .ph {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.4rem 2rem; border-bottom: 1px solid rgba(245,230,66,.14);

    }
    .ptitle { font-size: .75rem; font-weight: 800; letter-spacing: .22em; text-transform: uppercase; }
    .pclose {
      background: none; border: none; color: #F5E642; cursor: pointer;

      transition: opacity .15s, transform .15s; font-family: 'Syne', sans-serif;
    }
    .pclose:hover { opacity: 1; transform: rotate(90deg); }
    .pb {
      flex: 1; overflow-y: auto; padding: 2rem;
      scrollbar-width: thin; scrollbar-color: #F5E642 transparent;

    /* ── PANEL CONTENT ── */
    .hp h2 { font-size: clamp(2.2rem,7vw,4rem); font-weight:800; line-height:.88; letter-spacing:-.02em; margin-bottom:.8rem; }

    .abihead { font-size:.95rem; line-height:1.65; opacity:.85; margin-bottom:2.2rem; font-weight:600; }
    .hcs { display:flex; flex-direction:column; gap:1.8rem; }
    .hc  { display:flex; gap:1.1rem; align-items:flex-start; }
    .hav {
      width:66px; height:66px; border-radius:2px; flex-shrink:0;
      background:#2D1554; border:2px solid #F5E642;
      display:flex; align-items:center; justify-content:center; font-size:1.8rem;
    }
    .hn { font-size:.8rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase; margin-bottom:.35rem; }
    .hb { font-size:.78rem; line-height:1.6; opacity:.72; }
    .epl { display:flex; flex-direction:column; gap:1px; }
    .epc {
      padding:1rem 0; border-bottom:1px solid rgba(245,230,66,.1);
      cursor:pointer; transition:padding-left .2s;
      display:flex; align-items:flex-start; gap:.9rem;
    }
    .epc:hover { padding-left:.45rem; }
    .epn { font-size:.6rem; font-weight:800; letter-spacing:.15em; opacity:.3; padding-top:.1rem; min-width:28px; }
    .epi { flex:1; }
    .ept { font-size:.84rem; font-weight:700; margin-bottom:.25rem; line-height:1.3; }
    .epm { font-size:.65rem; letter-spacing:.1em; opacity:.4; text-transform:uppercase; }
    .epb {
      width:30px; height:30px; background:#F5E642; color:#1A0A2E;
      display:flex; align-items:center; justify-content:center;
      border-radius:50%; flex-shrink:0; transition:transform .15s;
    }
    .epc:hover .epb { transform:scale(1.15); }
    .igg { display:grid; grid-template-columns:repeat(3,1fr); gap:3px; margin-bottom:1.4rem; }
    .igp {
      aspect-ratio:1; background:#2D1554; border:1px solid rgba(245,230,66,.08);
      display:flex; align-items:center; justify-content:center; font-size:1.4rem;
      cursor:pointer; transition:border-color .18s,transform .18s;
      overflow:hidden; position:relative;
    }
    .igp:hover { border-color:#F5E642; transform:scale(1.03); z-index:1; }
    .igo {
      position:absolute; inset:0; background:rgba(26,10,46,.7);
      display:flex; align-items:center; justify-content:center;
      opacity:0; transition:opacity .18s; font-size:.65rem; font-weight:800; letter-spacing:.1em;
    }
    .igp:hover .igo { opacity:1; }
    .wbh { font-size:.72rem; font-weight:800; letter-spacing:.2em; text-transform:uppercase; opacity:.45; margin-bottom:1.4rem; }
    #cwrap { border:2px solid rgba(245,230,66,.25); cursor:crosshair; background:#1A0A2E; }
    #dc { display:block; width:100%; touch-action:none; }
    .wbt { display:flex; gap:.4rem; margin-top:.9rem; flex-wrap:wrap; align-items:center; }
    .wbb {
      padding:.35rem .8rem; background:none; border:1px solid rgba(245,230,66,.28);
      color:#F5E642; font-family:'Syne',sans-serif; font-size:.65rem; font-weight:700;
      letter-spacing:.1em; text-transform:uppercase; cursor:pointer; transition:background .15s,border-color .15s;
    }
    .wbb:hover,.wbb.act { background:#F5E642; color:#1A0A2E; border-color:#F5E642; }
    .csw {
      width:26px; height:26px; border:2px solid transparent; cursor:pointer;
      transition:border-color .15s,transform .15s;
    }
    .csw:hover,.csw.act { border-color:#F5E642; transform:scale(1.15); }
    .cpl { font-size:.95rem; font-weight:700; margin-bottom:1.8rem; opacity:.85; line-height:1.6; }
    .cpa { color:#F5E642; text-decoration:none; border-bottom:1px solid #F5E642; transition:opacity .15s; }
    .cpa:hover { opacity:.6; }
    .sr {
      display:flex; align-items:center; gap:.9rem; font-size:.72rem; font-weight:700;
      letter-spacing:.1em; text-transform:uppercase; opacity:.55; transition:opacity .15s;
      cursor:pointer; margin-bottom:.65rem;
    }
    .sr:hover { opacity:1; }
    .si {
      width:34px; height:34px; background:#2D1554; border:1px solid rgba(245,230,66,.18);
      display:flex; align-items:center; justify-content:center; font-size:.95rem;
    }

    /* ripple */
    .rpl {
      position:fixed; pointer-events:none;
      width:38px; height:38px; margin:-19px 0 0 -19px;
      border:2px solid #F5E642; border-radius:50%;
      animation:rout .5s ease forwards; z-index:9999;
    }
    @keyframes rout { from{transform:scale(0);opacity:1} to{transform:scale(3.2);opacity:0} }
  </style>
</head>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
const interactives = [];
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2(-9, -9);
let hovered = null;
let panelOpen = false;
let targetYaw = 0, targetPitch = 0;
let curYaw = 0, curPitch = 0;
let introT = 0;
let neonFrontMat, tvScreenMat, mainLight;

// ═══════════════════════════════════════════════════════════
//  WAIT FOR FONTS THEN INIT
// ═══════════════════════════════════════════════════════════
document.fonts.ready.then(init);

function init() {
  // ── RENDERER ──────────────────────────────────────────
  const canvas = document.getElementById('c');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0; // starts dark, fades in

  // ── SCENE ─────────────────────────────────────────────
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x120620);
  scene.fog = new THREE.Fog(0x120620, 18, 35);

  // ── CAMERA ────────────────────────────────────────────
  const camera = new THREE.PerspectiveCamera(65, innerWidth / innerHeight, 0.1, 50);
  camera.rotation.order = 'YXZ';
  // Standing inside the room at eye level, aim at the centre of the back wall
  camera.position.set(0, 7.0, 8);
  camera.lookAt(0, 5.0, -9);
  // Capture these as permanent base angles so look-around adds on top of them
  const BASE_YAW   = camera.rotation.y; // should be ~0
  const BASE_PITCH = camera.rotation.x; // slight upward tilt baked in

  // ── RESIZE ────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  // ═══════════════════════════════════════════════════════
  //  LIGHTING
  // ═══════════════════════════════════════════════════════
  // Soft purple-tinted ambient — enough to see everything, no pitch black
  scene.add(new THREE.AmbientLight(0x7755BB, 2.8));

  // Main overhead pendant — warm incandescent
  mainLight = new THREE.PointLight(0xFFD98A, 5.5, 28, 1.6);
  mainLight.position.set(0, 8.6, -1);
  mainLight.castShadow = true;
  mainLight.shadow.mapSize.set(2048, 2048);
  mainLight.shadow.radius = 2;
  scene.add(mainLight);

  // Second pendant toward front of room
  const frontLight = new THREE.PointLight(0xFFCC77, 3.5, 20, 1.6);
  frontLight.position.set(0, 8.6, 4);
  frontLight.castShadow = false;
  scene.add(frontLight);

  // Window — cool daylight coming from left wall
  const windowLight = new THREE.SpotLight(0xCCDDFF, 6.0, 24, Math.PI / 5, 0.35, 1.5);
  windowLight.position.set(-9, 7, -5);
  windowLight.target.position.set(0, 2, -2);
  windowLight.castShadow = true;
  windowLight.shadow.mapSize.set(1024, 1024);
  scene.add(windowLight);
  scene.add(windowLight.target);

  // Neon sign warm bounce on back wall
  const neonGlow = new THREE.PointLight(0xF5E642, 1.8, 10, 1.8);
  neonGlow.position.set(0, 7.2, -8);
  scene.add(neonGlow);

  // Floor lamp warm fill
  const lampFill = new THREE.PointLight(0xFFAA44, 2.0, 9, 2);
  lampFill.position.set(6.5, 5.5, 3);
  scene.add(lampFill);

  // ═══════════════════════════════════════════════════════
  //  ROOM GEOMETRY
  // ═══════════════════════════════════════════════════════
  const RW = 20, RH = 9, RD = 20;

  // ── Wall texture — painted plaster with subtle variation ──
  const wallCV = document.createElement('canvas'); wallCV.width = 512; wallCV.height = 512;
  { const c = wallCV.getContext('2d');
    c.fillStyle = '#2A0D58'; c.fillRect(0,0,512,512);
    for (let i=0;i<120;i++) {
      c.fillStyle = `rgba(${40+Math.random()*30},${5+Math.random()*8},${80+Math.random()*30},0.06)`;
      c.fillRect(Math.random()*512,Math.random()*512,Math.random()*90+10,Math.random()*30+4);
    }
    // subtle horizontal brushstroke lines
    for (let y=0;y<512;y+=6) {
      c.strokeStyle=`rgba(255,255,255,${0.01+Math.random()*0.015})`;
      c.lineWidth=1; c.beginPath(); c.moveTo(0,y+Math.random()*2); c.lineTo(512,y+Math.random()*2); c.stroke();
    }
  }
  const wallTex = new THREE.CanvasTexture(wallCV);
  wallTex.wrapS = wallTex.wrapT = THREE.RepeatWrapping;
  wallTex.repeat.set(3, 1.5);

  // ── Floor texture — dark hardwood planks ──
  const floorCV = document.createElement('canvas'); floorCV.width = 1024; floorCV.height = 1024;
  { const c = floorCV.getContext('2d');
    const planks = ['#18082E','#1D0A36','#150727','#1B0932','#17082C','#1C0A34'];
    const pH = 1024/8;
    planks.forEach((col,i) => {
      for(let row=0;row<8;row++) {
        c.fillStyle = planks[(row+i)%planks.length];
        c.fillRect(0, row*pH, 1024, pH);
        // wood grain lines
        c.strokeStyle='rgba(0,0,0,0.12)'; c.lineWidth=1;
        for(let g=1;g<6;g++){
          c.beginPath();
          c.moveTo(0, row*pH+g*(pH/6));
          c.bezierCurveTo(300, row*pH+g*(pH/6)+Math.random()*4-2,
                           700, row*pH+g*(pH/6)+Math.random()*4-2,
                           1024, row*pH+g*(pH/6));
          c.stroke();
        }
        // plank joint
        c.strokeStyle='rgba(0,0,0,0.35)'; c.lineWidth=2;
        c.beginPath(); c.moveTo(0,(row+1)*pH); c.lineTo(1024,(row+1)*pH); c.stroke();
      }
    });
  }
  const floorTex = new THREE.CanvasTexture(floorCV);
  floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
  floorTex.repeat.set(5, 5);

  const wallMat  = new THREE.MeshStandardMaterial({ map: wallTex, roughness: 0.88, metalness: 0.04 });
  const floorMat = new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.72, metalness: 0.08 });
  const ceilMat  = new THREE.MeshStandardMaterial({ color: 0x180530, roughness: 0.95 });

  function addWall(w, h, pos, rotY = 0, mat = wallMat) {
    const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
    m.position.set(...pos);
    m.rotation.y = rotY;
    m.receiveShadow = true;
    scene.add(m);
    return m;
  }

  // Floor
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(RW, RD), floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  // Ceiling
  const ceil = new THREE.Mesh(new THREE.PlaneGeometry(RW, RD), ceilMat);
  ceil.rotation.x = Math.PI / 2;
  ceil.position.y = RH;
  scene.add(ceil);

  addWall(RW, RH, [0, RH/2, -RD/2]);              // back
  addWall(RD, RH, [-RW/2, RH/2, 0], Math.PI/2);  // left
  addWall(RD, RH, [RW/2, RH/2, 0], -Math.PI/2);  // right

  // ── Baseboard trim along all walls ──
  const trimMat = new THREE.MeshStandardMaterial({ color: 0x3D1A70, roughness: 0.7, metalness: 0.1 });
  [ // [width, height, depth, x, y, z, rotY]
    [RW, 0.18, 0.1,  0,    0.09, -RD/2+0.06, 0],       // back
    [RD, 0.18, 0.1,  -RW/2+0.06, 0.09, 0, Math.PI/2],  // left
    [RD, 0.18, 0.1,   RW/2-0.06, 0.09, 0, Math.PI/2],  // right
  ].forEach(([w,h,d,x,y,z,ry]) => {
    const b = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), trimMat);
    b.position.set(x,y,z); b.rotation.y = ry; scene.add(b);
  });

  // ── Ceiling cornice moulding ──
  const cornMat = new THREE.MeshStandardMaterial({ color: 0x3A1568, roughness: 0.8 });
  [
    [RW, 0.22, 0.12, 0, RH-0.11, -RD/2+0.07, 0],
    [RD, 0.22, 0.12, -RW/2+0.07, RH-0.11, 0, Math.PI/2],
    [RD, 0.22, 0.12,  RW/2-0.07, RH-0.11, 0, Math.PI/2],
  ].forEach(([w,h,d,x,y,z,ry]) => {
    const c = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), cornMat);
    c.position.set(x,y,z); c.rotation.y = ry; scene.add(c);
  });

  // ── Window on left wall — with frame and light shaft ──
  const winFrameMat = new THREE.MeshStandardMaterial({ color: 0x4A2080, roughness: 0.6, metalness: 0.2 });
  // Outer frame
  const winFrame = new THREE.Mesh(new THREE.BoxGeometry(0.15, 3.4, 2.6), winFrameMat);
  winFrame.position.set(-RW/2+0.09, 6, -5);
  scene.add(winFrame);
  // Window glass (semi-transparent emissive glow)
  const winGlass = new THREE.Mesh(
    new THREE.PlaneGeometry(2.2, 3.0),
    new THREE.MeshStandardMaterial({
      color: 0xAABBFF, emissive: new THREE.Color(0x8899EE),
      emissiveIntensity: 0.6, transparent: true, opacity: 0.22,
      side: THREE.DoubleSide, roughness: 0.1
    })
  );
  winGlass.rotation.y = Math.PI/2;
  winGlass.position.set(-RW/2+0.12, 6, -5);
  scene.add(winGlass);
  // Window cross-bars
  const barMat = new THREE.MeshStandardMaterial({ color: 0x4A2080, roughness: 0.6 });
  const hBar = new THREE.Mesh(new THREE.BoxGeometry(0.1, 3.2, 0.08), barMat);
  hBar.rotation.y = Math.PI/2; hBar.position.set(-RW/2+0.1, 6, -5);
  scene.add(hBar);
  const vBar = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.08, 2.4), barMat);
  vBar.rotation.y = Math.PI/2; vBar.position.set(-RW/2+0.1, 6, -5);
  scene.add(vBar);
  // Light shaft from window (visible fog beam)
  const shaftGeo = new THREE.ConeGeometry(1.4, 7, 8, 1, true);
  const shaftMat = new THREE.MeshBasicMaterial({
    color: 0xCCDDFF, transparent: true, opacity: 0.04,
    side: THREE.DoubleSide, depthWrite: false
  });
  const shaft = new THREE.Mesh(shaftGeo, shaftMat);
  shaft.rotation.z = -Math.PI/2;
  shaft.position.set(-6, 6, -5);
  scene.add(shaft);

  // Ceiling lamp
  const lampMat = new THREE.MeshStandardMaterial({ color: 0xF5E642, emissive: new THREE.Color(0xF5E642), emissiveIntensity: 3 });
  const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.22, 10, 10), lampMat);
  lamp.position.set(0, 8.75, -2);
  scene.add(lamp);
  const cord = new THREE.Mesh(
    new THREE.CylinderGeometry(0.018, 0.018, 0.9, 5),
    new THREE.MeshStandardMaterial({ color: 0x1A0A2E })
  );
  cord.position.set(0, 9.2, -2);
  scene.add(cord);

  // Rug — brighter concentric rings
  const rugOuter = new THREE.Mesh(
    new THREE.CylinderGeometry(3.4, 3.4, 0.04, 48),
    new THREE.MeshStandardMaterial({ color: 0x5522AA, roughness: 1 })
  );
  rugOuter.position.set(0, 0.02, 3);
  scene.add(rugOuter);
  const rugMid = new THREE.Mesh(
    new THREE.CylinderGeometry(2.5, 2.5, 0.045, 48),
    new THREE.MeshStandardMaterial({ color: 0xF5E642, roughness: 1 })
  );
  rugMid.position.set(0, 0.022, 3);
  scene.add(rugMid);
  const rugInner = new THREE.Mesh(
    new THREE.CylinderGeometry(1.5, 1.5, 0.05, 48),
    new THREE.MeshStandardMaterial({ color: 0x7733DD, roughness: 1 })
  );
  rugInner.position.set(0, 0.024, 3);
  scene.add(rugInner);

  // ═══════════════════════════════════════════════════════
  //  TEXTURE HELPER
  // ═══════════════════════════════════════════════════════
  function makeTex(fn, w = 512, h = 256) {
    const cv = document.createElement('canvas');
    cv.width = w; cv.height = h;
    const ctx = cv.getContext('2d');
    ctx.fillStyle = '#0D0519';
    ctx.fillRect(0, 0, w, h);
    fn(ctx, w, h);
    return new THREE.CanvasTexture(cv);
  }

  function boxMesh(w, h, d, mat) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    m.castShadow = true;
    return m;
  }

  // ═══════════════════════════════════════════════════════
  //  INTERACTIVE OBJECT REGISTRY
  // ═══════════════════════════════════════════════════════
  function reg(mesh, room, label) {
    mesh.userData.room  = room;
    mesh.userData.label = label;
    mesh.userData.baseEmissive    = mesh.material.emissive ? mesh.material.emissive.clone() : new THREE.Color(0,0,0);
    mesh.userData.baseEmissiveInt = mesh.material.emissiveIntensity || 0;
    interactives.push(mesh);
  }

    ctx.fillStyle = '#080210'; ctx.fillRect(0, 0, W, H);
    const cols = 3, rows = 3;
    const gw = Math.floor(W/cols), gh = Math.floor(H/rows);
    const bg = ['#2D1554','#3D1F6E','#1E0C40','#3D1F6E','#2D1554','#1A0A2E','#1A0A2E','#3D1F6E','#2D1554'];
    bg.forEach((c, i) => {
      const cx = (i%3)*gw + 2, cy = Math.floor(i/3)*gh + 2;
      ctx.fillStyle = c; ctx.fillRect(cx, cy, gw-4, gh-4);
    });
    // IG icon
    ctx.strokeStyle = 'rgba(245,230,66,.5)'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(W/2, H/2, Math.min(W,H)*.22, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(W/2, H/2, Math.min(W,H)*.12, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = 'rgba(245,230,66,.5)';
    ctx.beginPath(); ctx.arc(W/2+W*.14, H/2-H*.14, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(245,230,66,.35)';
    ctx.font = `700 ${H*.09}px Syne, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText('@radio_forma', W/2, H*.97);
  }, 512, 384);

  tvScreenMat = new THREE.MeshStandardMaterial({
    map: tvTex, emissiveMap: tvTex,
    emissive: new THREE.Color(0x3D1F6E), emissiveIntensity: 0.35,
    roughness: 0.6
  });

  const tvGrp = new THREE.Group();
  const tvBody = boxMesh(0.18, 2.6, 4.0,
    new THREE.MeshStandardMaterial({ color: 0x0D0519, roughness: .75 }));
  const tvScr = new THREE.Mesh(
    new THREE.PlaneGeometry(3.6, 2.25),
    tvScreenMat
  );
  tvScr.rotation.y = -Math.PI / 2;
  tvScr.position.x = -0.1;
  const tvStd = boxMesh(0.2, 0.65, 0.85,
    new THREE.MeshStandardMaterial({ color: 0x1A0A2E, roughness: .9 }));
  tvStd.position.set(-0.05, -1.62, 0);
  const tvBase = boxMesh(0.18, 0.1, 1.8,
    new THREE.MeshStandardMaterial({ color: 0x1A0A2E }));
  tvBase.position.set(-0.05, -1.98, 0);
  const tvLed = new THREE.Mesh(
    new THREE.SphereGeometry(0.04, 6, 6),
    new THREE.MeshStandardMaterial({ color: 0xF5E642, emissive: new THREE.Color(0xF5E642), emissiveIntensity: 2.5 })
  );
  tvLed.position.set(-0.11, -0.98, 1.78);
  tvGrp.add(tvBody, tvScr, tvStd, tvBase, tvLed);
  tvGrp.position.set(9.86, 5.0, -2);
  scene.add(tvGrp);
  reg(tvScr, 'community', 'Community');

  // ═══════════════════════════════════════════════════════
  //  OBJECT 6 — MAILBOX (Contact)  right wall
  // ═══════════════════════════════════════════════════════
  const mailTex = makeTex((ctx, W, H) => {
    ctx.strokeStyle = 'rgba(245,230,66,.28)'; ctx.lineWidth = 4;
    ctx.strokeRect(8, 8, W-16, H-16);

    // envelope body
    const ex=W*.1, ey=H*.14, ew=W*.8, eh=H*.6;
    ctx.strokeStyle = '#F5E642'; ctx.lineWidth = 5;
    ctx.strokeRect(ex, ey, ew, eh);

    // envelope flap V
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex+ew/2, ey+eh*.52);
    ctx.lineTo(ex+ew, ey);
    ctx.stroke();

    ctx.fillStyle = 'rgba(245,230,66,.65)';
    ctx.font = `700 ${H*.13}px Syne, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('WRITE TO US', W/2, H*.88);
  }, 384, 256);

  const mlGrp = new THREE.Group();
  const mlBody = boxMesh(0.22, 1.5, 2.4,
    new THREE.MeshStandardMaterial({ color: 0x1A0A2E, roughness: .9 }));
  const mlFace = new THREE.Mesh(
    new THREE.PlaneGeometry(2.2, 1.4),
    new THREE.MeshStandardMaterial({ map: mailTex, roughness: .9, side: THREE.DoubleSide })
  );
  mlFace.rotation.y = -Math.PI / 2;
  mlFace.position.x = -0.12;
  const mlSlot = boxMesh(0.3, 0.09, 1.3,
    new THREE.MeshStandardMaterial({ color: 0x080110, roughness: 1 }));
  mlSlot.position.set(-0.04, 0.4, 0);
  mlGrp.add(mlBody, mlFace, mlSlot);
  mlGrp.position.set(9.86, 2.5, -6.5);
  scene.add(mlGrp);
  reg(mlFace, 'contact', 'Contact');

  // ═══════════════════════════════════════════════════════
  //  FLY-TO SYSTEM
  // ═══════════════════════════════════════════════════════

  // ── Fly helpers ───────────────────────────────────────────
  function getLookAngles(from, to) {
    const obj = new THREE.Object3D();
    obj.rotation.order = 'YXZ';
    obj.position.copy(from);
    obj.lookAt(to);
    return { y: obj.rotation.y, x: obj.rotation.x };
  }

  function lerpAngle(a, b, t) {
    let d = ((b - a) % (Math.PI * 2) + Math.PI * 3) % (Math.PI * 2) - Math.PI;
    return a + d * t;
  }

  const HOME_POS  = new THREE.Vector3(0, 7.0,  8.0);
  const HOME_LOOK = new THREE.Vector3(0, 5.0, -9.0);

  let flyState = null;

  function beginFly(endPos, lookTarget, room, doOpenPanel) {
    const angles = getLookAngles(endPos, lookTarget);
    flyState = {
      startPos:   camera.position.clone(),
      endPos:     endPos.clone(),
      startYaw:   camera.rotation.y,
      startPitch: camera.rotation.x,
      endYaw:     angles.y,
      endPitch:   angles.x,
      room, openPanel: doOpenPanel,
      progress: 0,
    };
  }

  // Called by closePanel (defined outside module scope)
  window.startFly = (room) => {
    if (room === '_home') beginFly(HOME_POS, HOME_LOOK, '_home', false);
  };

  // ═══════════════════════════════════════════════════════
  //  MOUSE INTERACTION
  // ═══════════════════════════════════════════════════════
  const tip = document.getElementById('tip');

  window.addEventListener('mousemove', e => {
    mouse.x = (e.clientX / innerWidth)  * 2 - 1;
    mouse.y = -(e.clientY / innerHeight) * 2 + 1;

    tip.style.left = e.clientX + 'px';
    tip.style.top  = e.clientY + 'px';

    if (!panelOpen && !flyState) {
      const nx = (e.clientX / innerWidth  - .5) * 2;
      const ny = (e.clientY / innerHeight - .5) * 2;
      targetYaw   = -nx * 0.28;
      targetPitch =  ny * 0.09;
    }
  });

  window.addEventListener('click', e => {
    if (panelOpen || flyState) return;

    // Re-cast ray at click moment for accuracy
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(interactives);
    if (!hits.length) return;

    const hit = hits[0];
    const room = hit.object.userData.room;

    // Compute world-space surface normal of the face that was clicked
    const worldNormal = hit.face.normal.clone()
      .transformDirection(hit.object.matrixWorld)
      .normalize();

    // Camera destination: 1.4 units in front of the exact hit point
    const destPos  = hit.point.clone().addScaledVector(worldNormal, 1.4);
    // Look straight at the hit point
    const lookTarget = hit.point.clone();

    spawnRipple(e.clientX, e.clientY);
    beginFly(destPos, lookTarget, room, true);
  });

  // touch
  document.getElementById('c').addEventListener('touchend', e => {
    if (panelOpen || flyState) return;
    const tc = e.changedTouches[0];
    mouse.x = (tc.clientX / innerWidth)  * 2 - 1;
    mouse.y = -(tc.clientY / innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(interactives);
    if (!hits.length) return;
    const hit = hits[0];
    const worldNormal = hit.face.normal.clone().transformDirection(hit.object.matrixWorld).normalize();
    const destPos    = hit.point.clone().addScaledVector(worldNormal, 1.4);
    beginFly(destPos, hit.point.clone(), hit.object.userData.room, true);
  }, { passive: true });

  // ═══════════════════════════════════════════════════════
  //  ANIMATE LOOP
  // ═══════════════════════════════════════════════════════
  const clock = new THREE.Clock();

  function glow(mesh, on) {
    if (!mesh.material.emissive) return;
    if (on) {
      mesh.material.emissive.set(0xF5E642);
      mesh.material.emissiveIntensity = 0.55;
    } else {
      mesh.material.emissive.copy(mesh.userData.baseEmissive);
      mesh.material.emissiveIntensity = mesh.userData.baseEmissiveInt;
    }
  }

  let prevT = 0;

  function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    const dt = Math.min(t - prevT, 0.05); // delta, capped to avoid jumps
    prevT = t;

    // Intro fade-in
    if (introT < 1) {
      introT = Math.min(t / 2.2, 1);
      const ease = 1 - Math.pow(1 - introT, 3);
      renderer.toneMappingExposure = ease * 2.8;
      camera.position.z = 8 + (1 - ease) * 1.2;
    }

    // ── Fly-to animation ──
    if (flyState) {
      flyState.progress += dt / 1.1; // 1.1 s duration
      const p = Math.min(flyState.progress, 1);
      const ease = 1 - Math.pow(1 - p, 3); // cubic ease-out

      camera.position.lerpVectors(flyState.startPos, flyState.endPos, ease);
      camera.rotation.y = lerpAngle(flyState.startYaw,   flyState.endYaw,   ease);
      camera.rotation.x = lerpAngle(flyState.startPitch, flyState.endPitch, ease);

      if (p >= 1) {
        const fs = flyState;
        flyState = null;
        if (fs.openPanel) {
          // Reset look-around to neutral so it doesn't snap on close
          curYaw = 0; curPitch = 0; targetYaw = 0; targetPitch = 0;
          openPanel(fs.room);
        }
      }
    } else if (!panelOpen) {
      // Normal look-around
      curYaw   += (targetYaw   - curYaw)   * 0.055;
      curPitch += (targetPitch - curPitch) * 0.055;
      camera.rotation.y = BASE_YAW   + curYaw;
      camera.rotation.x = BASE_PITCH + curPitch;
    }

    // Clock hands animate with real time
    if (window._clockHour && window._clockMin) {
      const now = new Date();
      window._clockHour.rotation.z = -((now.getHours() % 12) / 12) * Math.PI * 2 - (now.getMinutes() / 60) * (Math.PI / 6);
      window._clockMin.rotation.z  = -(now.getMinutes() / 60) * Math.PI * 2;
    }

    // Neon flicker
    if (neonFrontMat) {
      neonFrontMat.emissiveIntensity = 0.22
        + Math.sin(t * 2.4) * 0.025
        + (Math.random() < 0.004 ? -0.18 : 0);
    }

    // TV screen pulse
    if (tvScreenMat) {
      tvScreenMat.emissiveIntensity = 0.35 + Math.sin(t * 1.1) * 0.04;
    }

    // Lamp flicker
    if (mainLight) {
      mainLight.intensity = 2.2 + Math.sin(t * 1.4) * 0.06;
    }

    // Hover detection
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(interactives);
    if (hits.length && !panelOpen) {
      const hit = hits[0].object;
      if (hit !== hovered) {
        if (hovered) glow(hovered, false);
        hovered = hit;
        glow(hovered, true);
      }
      tip.textContent = hovered.userData.label;
      tip.classList.add('on');
      document.body.style.cursor = 'pointer';
    } else {
      if (hovered) { glow(hovered, false); hovered = null; }
      tip.classList.remove('on');
      document.body.style.cursor = 'default';
    }

    renderer.render(scene, camera);
  }

  animate();
  setTimeout(() => document.getElementById('c').classList.add('ready'), 100);
}

let drawColor = '#F5E642', drawSize = 6, drawTool = 'pen', drawing = false, lx = 0, ly = 0;

window.setColor = (c, el) => {
  drawColor = c;
  document.querySelectorAll('.csw').forEach(s => s.classList.remove('act'));
  el.classList.add('act');
};
window.setTool = (t, el) => {
  drawTool = t;
  document.querySelectorAll('.wbb').forEach(b => b.classList.remove('act'));
  el.classList.add('act');
};
window.setBrush = v => { drawSize = parseInt(v); };
window.clearWB = () => {
  const dc = document.getElementById('dc');
  if (dc) dc.getContext('2d').clearRect(0, 0, dc.width, dc.height);
};

function initWB() {
  const wrap = document.getElementById('cwrap');
  const dc   = document.getElementById('dc');
  if (!dc) return;
  dc.width  = wrap.clientWidth;
  dc.height = Math.round(wrap.clientWidth * 0.6);
  const ctx = dc.getContext('2d');
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  function pos(e) {
    const r = dc.getBoundingClientRect();
    const sx = dc.width / r.width, sy = dc.height / r.height;
    const src = e.touches ? e.touches[0] : e;
    return [(src.clientX - r.left)*sx, (src.clientY - r.top)*sy];
  }
  function start(e) { drawing=true; [lx,ly]=pos(e); e.preventDefault(); }
  function move(e) {
    if (!drawing) return; e.preventDefault();
    const [x,y] = pos(e);
    ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(x,y);
    if (drawTool==='erase') {
      ctx.globalCompositeOperation='destination-out'; ctx.lineWidth=drawSize*4;
    } else {
      ctx.globalCompositeOperation='source-over'; ctx.strokeStyle=drawColor; ctx.lineWidth=drawSize;
    }
    ctx.stroke(); [lx,ly]=[x,y];
  }
  function stop() { drawing=false; }
  dc.addEventListener('mousedown',start); dc.addEventListener('mousemove',move);
  dc.addEventListener('mouseup',stop);    dc.addEventListener('mouseleave',stop);
  dc.addEventListener('touchstart',start,{passive:false}); dc.addEventListener('touchmove',move,{passive:false});
  dc.addEventListener('touchend',stop);
}

const panel = document.getElementById('panel');
const ptitle = document.getElementById('ptitle');
const pb     = document.getElementById('pb');
const ov     = document.getElementById('ov');

window.openPanel = function openPanel(room) {
  const data = PANELS[room];
  if (!data) return;
  ptitle.textContent = data.title;
  pb.innerHTML = data.html;
  panel.classList.add('open');
  ov.classList.add('on');
  panelOpen = true;
  document.body.style.cursor = 'default';
  if (data.onOpen) setTimeout(data.onOpen, 60);
};

function closePanel() {
  panel.classList.remove('open');
  ov.classList.remove('on');
  panelOpen = false;
  // Fly camera back to the home position
  if (typeof startFly === 'function') startFly('_home');
}

document.getElementById('pclose').addEventListener('click', closePanel);
ov.addEventListener('click', closePanel);

function spawnRipple(x, y) {
  const r = document.createElement('div');
  r.className = 'rpl';
  r.style.left = x + 'px'; r.style.top = y + 'px';
  document.body.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
}
